services:
  - type: web
    name: resumeai-backend
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: resume_parser
      - key: UPLOAD_FOLDER
        value: uploads
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: GROQ_API_KEY
        sync: false